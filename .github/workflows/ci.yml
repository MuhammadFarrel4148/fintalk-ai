name: Continuous Integration

on:
  pull_request:
    branches:
      - master

jobs:
  test-backend:
    runs-on: ubuntu-latest
    container: node:24-bookworm-slim
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: fintalk_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:password@db:5432/fintalk_test?schema=public
      JWT_SECRET: test-secret-ci
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSSL
        run: apt-get update -y && apt-get install -y openssl
      - name: Install API deps
        run: cd apps/api && npm ci
      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
      - name: Push schema to test DB
        run: cd apps/api && npm run test:db:push
      - name: Run backend tests
        run: cd apps/api && npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install Web deps
        run: cd apps/web && npm ci
      - name: Run frontend tests
        run: cd apps/web && npm test
