services:
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - "3100:3100"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fintalk
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  pgdata:
